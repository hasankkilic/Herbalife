# Her hafta Herbalife TR resmi sitesini tarar; urun/tarif/makale/SSS
# degisiklikleri varsa otomatik commit'leyip yayinlar.
# Elle calistirmak icin: GitHub → Actions → bu is akisi → "Run workflow"
name: Herbalife icerik guncelleme

on:
  schedule:
    - cron: "0 4 * * 1"   # her pazartesi 04:00 UTC (Turkiye 07:00)
  workflow_dispatch:

jobs:
  guncelle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Urun katalogunu cek
        run: python araclar/urunler-guncelle.py

      - name: Tarif / makale / SSS iceriklerini cek
        run: python araclar/icerik-guncelle.py

      - name: Degisiklik varsa yayinla
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Degisiklik yok, yayin gerekmiyor."
          else
            git commit -m "Otomatik: Herbalife katalog ve icerikleri guncellendi"
            git push
          fi
